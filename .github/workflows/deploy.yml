name: Build & Deploy to AWS

# Every push to main builds the Docker image, pushes it to Amazon ECR, and
# (if configured) triggers an AWS App Runner deployment. Nothing runs locally.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPO:latest" -t "$REGISTRY/$REPO:$TAG" .
          docker push "$REGISTRY/$REPO:latest"
          docker push "$REGISTRY/$REPO:$TAG"

      # Force ECS to redeploy so it pulls the new :latest image (ECS Express).
      # Cluster/service default to this deployment; override with repo variables.
      - name: Redeploy ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER || 'default' }}" \
            --service "${{ vars.ECS_SERVICE || 'liberia-emr-francordsoft' }}" \
            --force-new-deployment
